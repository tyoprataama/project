<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>Field Management System</title>
    <script type="text/javascript">
      // SPA fallback untuk GitHub Pages (teknik rafgraph/spa-github-pages).
      // pathSegmentsToKeep = 1 karena app berada di sub-path "/project/".
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
